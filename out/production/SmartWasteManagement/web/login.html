<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Smart Waste Management - Login</title>
  <style>
    body {
        font-family: 'Segoe UI', sans-serif;
        background: #f0f2f5;
        display: flex;
        justify-content: center;
        align-items: center;
        height: 100vh;
        margin: 0;
    }
    .login-card {
        background: white;
        padding: 40px;
        border-radius: 15px;
        box-shadow: 0 10px 30px rgba(0,0,0,0.1);
        width: 350px;
        text-align: center;
    }
    h2 { color: #2e7d32; margin-bottom: 20px; }
    input {
        width: 100%;
        padding: 12px;
        margin: 10px 0;
        border: 1px solid #ddd;
        border-radius: 8px;
        box-sizing: border-box; /* padding fix */
    }
    .btn-login {
        width: 100%;
        padding: 12px;
        background: #2e7d32;
        color: white;
        border: none;
        border-radius: 8px;
        cursor: pointer;
        font-size: 16px;
        font-weight: bold;
        transition: 0.3s;
    }
    .btn-login:hover { background: #1b5e20; }
    .footer-text { margin-top: 15px; font-size: 13px; color: #666; }
  </style>
</head>
<body>

<div class="login-card">
  <h2>Admin Login</h2>
  <p>Enter your credentials to access the Dashboard</p>

  <input type="text" id="username" placeholder="Username (admin)">
  <input type="password" id="password" placeholder="Password (123)">

  <button class="btn-login" onclick="validate()">Login</button>

  <div class="footer-text">Project Head: Sara Din</div>
</div>

<script>
  function validate() {
      const user = document.getElementById('username').value;
      const pass = document.getElementById('password').value;

      // Simple Logic for demo
      if (user === "admin" && pass === "123") {
          // localStorage ek temporary storage hai browser mein
          localStorage.setItem("isLoggedIn", "true");
          window.location.href = "index.html";
      } else {
          alert("Incorrect username or password! (Try admin / 123)");
      }
  }
</script>

</body>
</html>
